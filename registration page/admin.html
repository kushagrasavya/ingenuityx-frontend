<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngenuityX | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FAFAFA; font-family: 'Space Grotesk', sans-serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
        .modal { transition: opacity 0.3s ease; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="p-10">

    <div class="max-w-7xl mx-auto">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-zinc-900 tracking-tighter">Admin Portal</h1>
            <p class="text-zinc-500">Live Applicant Data</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl border border-zinc-200 shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-1">Participants</p>
                    <p class="text-xs text-zinc-400 font-sans">Challenge & Hackathon</p>
                </div>
                <span id="count-participate" class="text-3xl font-bold text-zinc-900">0</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-end mb-6 gap-4">
            <div class="flex gap-3 w-full md:w-auto ml-auto">
                <input type="text" id="searchInput" placeholder="Search name or username..." 
                    class="bg-white border border-zinc-200 px-4 py-2 rounded-lg text-sm w-full md:w-64 focus:outline-none focus:border-black transition-colors font-sans"
                    oninput="applyFilters()">
                
                <select id="filterInput" 
                    class="bg-white border border-zinc-200 px-4 py-2 rounded-lg text-sm focus:outline-none focus:border-black transition-colors font-sans cursor-pointer"
                    onchange="applyFilters()">
                    <option value="all">Show All</option>
                    <option value="participate">Participants Only</option>
                </select>

                <button onclick="fetchData()" class="bg-black text-white px-6 py-2 rounded-lg text-sm font-bold hover:bg-zinc-800 transition-colors shadow-lg">Refresh</button>
            </div>
        </div>

        <div class="bg-white border border-zinc-200 rounded-xl overflow-hidden shadow-sm">
            <table class="w-full text-left text-sm text-zinc-600">
                <thead class="bg-zinc-50 border-b border-zinc-200 uppercase tracking-wider text-xs font-bold text-zinc-900">
                    <tr>
                        <th class="p-4">ID</th>
                        <th class="p-4">Candidate</th>
                        <th class="p-4">Role</th>
                        <th class="p-4">Intent</th>
                        <th class="p-4">Media</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-zinc-100"></tbody>
            </table>
        </div>
    </div>

    <div id="media-modal" class="modal opacity-0 pointer-events-none fixed inset-0 z-[60] flex items-center justify-center bg-black/95 backdrop-blur-md p-4">
        <div class="relative w-full h-full flex flex-col items-center justify-center">
            <button onclick="closeMediaModal()" class="absolute top-4 right-4 text-white/50 hover:text-white text-sm font-bold uppercase tracking-widest border border-white/20 px-4 py-2 rounded-full transition-colors z-50">Close ✕</button>
            <div id="media-content" class="w-full h-full flex items-center justify-center p-4"></div>
        </div>
    </div>

    <script>
        let allApplicants = []; 

        async function fetchData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center animate-pulse">Loading data...</td></tr>';
            try {
                const res = await fetch('http://localhost:5000/api/applicants');
                const data = await res.json();
                allApplicants = data; 
                
                let participateCount = 0;
                data.forEach(user => {
                    if (user.purpose === 'participate' || !user.purpose) {
                         participateCount++;
                    }
                });
                document.getElementById('count-participate').innerText = participateCount;
                
                applyFilters();
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">Server Offline. Run "node server.js"</td></tr>`;
            }
        }

        function cleanPath(path) {
            if (!path) return null;
            return path.replace(/\\/g, '/');
        }

        function applyFilters() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filterValue = document.getElementById('filterInput').value;

            const filtered = allApplicants.filter(user => {
                const name = (user.name || '').toLowerCase();
                const username = (user.username || '').toLowerCase();
                const matchesSearch = name.includes(searchText) || username.includes(searchText);
                let matchesFilter = true;
                const isParticipate = (user.purpose === 'participate');
                if (filterValue === 'participate') matchesFilter = isParticipate;
                return matchesSearch && matchesFilter;
            });
            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-zinc-400">No matching records found.</td></tr>'; return; }

            data.forEach((user) => {
                let who = user.work_status ? user.work_status : 'Participant';
                who = who.charAt(0).toUpperCase() + who.slice(1);

                // --- UPDATED INTENT LOGIC ---
                // "Add participants to all" as requested
                const intent = "Participant";
                const intentColor = "bg-orange-100 text-orange-700";

                const vidUrl = user.videoPitchPath ? `http://localhost:5000/${cleanPath(user.videoPitchPath)}` : null;
                const workUrl = user.walkthroughPath ? `http://localhost:5000/${cleanPath(user.walkthroughPath)}` : null;
                const imgUrl = user.photoPath ? `http://localhost:5000/${cleanPath(user.photoPath)}` : null;
                
                // --- UPDATED MEDIA LOGIC ---
                // Checks if no media exists, then adds "PENDING" badge
                const hasMedia = vidUrl || workUrl || imgUrl;

                const row = `
                    <tr class="hover:bg-zinc-50 transition-colors group border-b border-zinc-50">
                        <td class="p-4 font-mono text-xs font-bold text-zinc-400 group-hover:text-black">${user.registrationId}</td>
                        <td class="p-4">
                            <div class="font-bold text-zinc-900 text-base">${user.name || 'Unknown'}</div>
                            <div class="text-xs text-zinc-500">@${user.username}</div>
                        </td>
                        <td class="p-4"><span class="font-bold text-sm text-zinc-700 border border-zinc-200 px-2 py-1 rounded bg-white">${who}</span></td>
                        <td class="p-4"><span class="${intentColor} px-2 py-1 rounded text-xs font-bold uppercase tracking-wide">${intent}</span></td>
                        <td class="p-4">
                            <div class="flex gap-2 items-center">
                                ${vidUrl ? `<button onclick="openMediaModal('video', '${vidUrl}')" class="px-3 py-1 border border-zinc-200 rounded bg-white hover:border-orange-500 text-xs font-bold text-zinc-600 hover:text-orange-600">▶ Pitch</button>` : ''}
                                ${workUrl ? `<button onclick="openMediaModal('video', '${workUrl}')" class="px-3 py-1 border border-zinc-200 rounded bg-white hover:border-blue-500 text-xs font-bold text-zinc-600 hover:text-blue-600">▶ Demo</button>` : ''}
                                ${imgUrl ? `<button onclick="openMediaModal('image', '${imgUrl}')" class="px-3 py-1 border border-zinc-200 rounded bg-white hover:border-orange-500 text-xs font-bold text-zinc-600 hover:text-orange-600">📷 Face</button>` : ''}
                                ${!hasMedia ? '<span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded uppercase tracking-wide">Pending</span>' : ''}
                            </div>
                        </td>
                        <td class="p-4 text-center w-48">
                            <div id="actions-${user._id}" class="flex items-center justify-center gap-2">
                                <button onclick="toggleDetails('${user._id}')" id="btn-view-${user._id}" class="bg-white border border-zinc-200 text-zinc-700 text-xs font-bold px-4 py-2 rounded-lg hover:border-black hover:text-black transition-all">View</button>
                                <button onclick="initDelete('${user._id}')" class="bg-zinc-900 text-white text-xs font-bold px-4 py-2 rounded-lg hover:bg-red-600 transition-colors shadow-sm">Delete</button>
                            </div>
                            <div id="confirm-${user._id}" class="hidden flex items-center justify-center gap-2 animate-pulse">
                                <span class="text-[10px] font-bold text-red-600 uppercase">Sure?</span>
                                <button onclick="executeDelete('${user._id}')" class="bg-red-600 text-white text-xs font-bold px-3 py-2 rounded hover:bg-red-700">Yes</button>
                                <button onclick="cancelDelete('${user._id}')" class="bg-zinc-200 text-zinc-600 text-xs font-bold px-3 py-2 rounded hover:bg-zinc-300">No</button>
                            </div>
                        </td>
                    </tr>
                    <tr id="details-${user._id}" class="hidden bg-zinc-50 border-b border-zinc-200">
                        <td colspan="6" class="p-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 fade-in font-sans">
                                ${generateDetailHTML(user)}
                            </div>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        }

        function generateDetailHTML(user) {
            const createSection = (title, content) => {
                if(!content || (Array.isArray(content) && content.length === 0)) return '';
                return `<div class="bg-white p-4 rounded-lg border border-zinc-200 shadow-sm mb-4"><h4 class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-2">${title}</h4><div class="text-zinc-900 text-sm leading-relaxed whitespace-pre-wrap">${content}</div></div>`;
            };
            const linkItem = (url) => `<a href="${url}" target="_blank" class="block text-blue-600 underline truncate hover:text-blue-800 font-bold mb-1">${url}</a>`;

            let leftCol = ''; let rightCol = '';
            
            let identity = `<b>Full Name:</b> ${user.name || '-'}\n<b>Email:</b> ${user.email || '-'}\n<b>Phone:</b> ${user.phone || '-'}\n<b>City:</b> ${user.city || '-'}\n<b>Submitted:</b> ${new Date(user.submittedAt).toLocaleString()}`;
            leftCol += createSection("Identity & Contact", identity);

            let acad = '';
            if(user.resumePath) {
                const resumeLink = `http://localhost:5000/${cleanPath(user.resumePath)}`;
                acad += `<a href="${resumeLink}" target="_blank" class="inline-flex items-center gap-2 bg-zinc-900 text-white text-[10px] font-bold px-3 py-2 rounded mb-3 hover:bg-orange-600 transition-colors">📄 DOWNLOAD RESUME</a><br>`;
            }
            if(user.university || user.stream) acad += `<b>University:</b> ${user.university || '-'}\n<b>Stream:</b> ${user.stream || '-'}\n`;
            if(user.company || user.job_title) acad += `<b>Company:</b> ${user.company || '-'}\n<b>Role:</b> ${user.job_title || '-'}\n<b>Exp:</b> ${user.yoe || '-'} years`;
            leftCol += createSection("Background", acad);

            let socials = [];
            if(user.linkedin) socials.push(linkItem(user.linkedin));
            if(user.instagram) socials.push(linkItem(user.instagram));
            if(user.extra_links && user.extra_links.length > 0) user.extra_links.forEach(l => socials.push(linkItem(l)));
            leftCol += createSection("Socials & Portfolio", socials.join(''));

            if(user.interests && user.interests.length > 0) {
                let tags = user.interests.map(i => `<span class="inline-block bg-zinc-100 px-2 py-1 rounded text-xs mr-1 mb-1 border border-zinc-200">${i}</span>`).join('');
                leftCol += createSection("Interests", tags);
            }

            if(user.skills) rightCol += createSection("Superpower / Skills", user.skills);
            if(user.brag) rightCol += createSection("Humble Brag", user.brag);
            if(user.failure) rightCol += createSection("Failure Arc", user.failure);
            if(user.motivation) rightCol += createSection("Motivation", user.motivation);
            if(user.roast_us) rightCol += createSection("Roast / Feedback", user.roast_us);
            if(user.red_flag) rightCol += createSection("Red Flag", user.red_flag);
            if(user.unpopular_op) rightCol += createSection("Unpopular Opinion", user.unpopular_op);
            if(user.experience_elaborate) rightCol += createSection("Experience Detail", user.experience_elaborate);
            
            if(user.proof_links && user.proof_links.length > 0) {
                let pl = user.proof_links.map(l => linkItem(l)).join('');
                rightCol += createSection("Proof of Work", pl);
            }

            return `<div class="flex flex-col">${leftCol}</div><div class="flex flex-col">${rightCol}</div>`;
        }

        function openMediaModal(type, url) {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('media-content');
            if (type === 'video') { content.innerHTML = `<video controls autoplay class="max-w-full max-h-[85vh] rounded-lg shadow-2xl border border-white/10 outline-none"><source src="${url}" type="video/webm"><source src="${url}" type="video/mp4"></video>`; } 
            else { content.innerHTML = `<img src="${url}" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl border border-white/10">`; }
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function closeMediaModal() {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('media-content');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
            setTimeout(() => { content.innerHTML = ''; }, 300);
        }

        document.getElementById('media-modal').addEventListener('click', (e) => {
            if(e.target === document.getElementById('media-modal') || e.target === document.getElementById('media-content')) closeMediaModal();
        });

        function toggleDetails(id) {
            const row = document.getElementById(`details-${id}`);
            const btn = document.getElementById(`btn-view-${id}`);
            if (row.classList.contains('hidden')) { row.classList.remove('hidden'); btn.innerText = "Hide"; btn.classList.add('bg-zinc-100'); }
            else { row.classList.add('hidden'); btn.innerText = "View"; btn.classList.remove('bg-zinc-100'); }
        }

        function initDelete(id) { document.getElementById(`actions-${id}`).classList.add('hidden'); document.getElementById(`confirm-${id}`).classList.remove('hidden'); }
        function cancelDelete(id) { document.getElementById(`actions-${id}`).classList.remove('hidden'); document.getElementById(`confirm-${id}`).classList.add('hidden'); }
        
        async function executeDelete(id) {
            try {
                const res = await fetch(`http://localhost:5000/api/applicants/${id}`, { method: 'DELETE' });
                const result = await res.json();
                if(result.success) fetchData(); else { alert(result.message); cancelDelete(id); }
            } catch(e) { console.error(e); alert("Server error."); cancelDelete(id); }
        }

        fetchData();
    </script>
</body>
</html>
